<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EnvJobs Portal</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
}
input {
    padding: 10px;
    width: 250px;
    margin: 5px;
}
button {
    padding: 10px 20px;
    margin-top: 10px;
}
.hidden {
    display: none;
}
</style>

</head>
<body>

<!-- REGISTER PAGE (VISIBLE FIRST) -->
<div id="registerPage">
    <h2>Register</h2>

    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="password" id="regPassword" placeholder="Password"><br>
    <input type="password" id="confirmPassword" placeholder="Confirm Password"><br>

    <button onclick="register()">Register</button>
</div>

<!-- APPLICATION PAGE (HIDDEN FIRST) -->
<div id="applyPage" class="hidden">
    <h2>Apply for Job</h2>

    <input type="text" id="firstName" placeholder="First Name"><br>
    <input type="text" id="lastName" placeholder="Last Name"><br>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="text" id="phone" placeholder="Phone"><br>
    <input type="text" id="qualification" placeholder="Qualification"><br>
    <input type="text" id="post" placeholder="Interested Post"><br>

    <button onclick="apply()">Submit Application</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSABfY7HBkOHLHbnJFBpoPoKNCzReKnPg",
  authDomain: "envjobs-49d56.firebaseapp.com",
  projectId: "envjobs-49d56",
  storageBucket: "envjobs-49d56.firebasestorage.app",
  messagingSenderId: "107525561773",
  appId: "1:107525561773:web:6825902afb7b661c099524"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// REGISTER
window.register = async function() {

    let email = document.getElementById("regEmail").value;
    let password = document.getElementById("regPassword").value;
    let confirm = document.getElementById("confirmPassword").value;

    if(email === "" || password === "" || confirm === "") {
        alert("Fill all fields");
        return;
    }

    if(password !== confirm) {
        alert("Passwords do not match");
        return;
    }

    try {
        await addDoc(collection(db, "users"), {
            email: email,
            password: password,
            time: new Date()
        });

        alert("Registration successful!");

        // SHOW APPLICATION PAGE
        document.getElementById("registerPage").style.display = "none";
        document.getElementById("applyPage").style.display = "block";

        document.getElementById("email").value = email;

    } catch (e) {
        console.error(e);
        alert("Error saving user");
    }
};

// APPLY
window.apply = async function() {

    let data = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        qualification: document.getElementById("qualification").value,
        post: document.getElementById("post").value,
        time: new Date()
    };

    if(Object.values(data).includes("")) {
        alert("Fill all fields");
        return;
    }

    try {
        await addDoc(collection(db, "applications"), data);
        alert("Application submitted!");

    } catch (e) {
        console.error(e);
        alert("Error submitting");
    }
};
</script>

</body>
</html>
