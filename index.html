<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EnvJobs Application</title>

<style>
body { font-family: Arial; text-align: center; margin-top: 50px; }
input { padding: 10px; width: 250px; margin: 5px; }
button { padding: 10px 20px; }
</style>

</head>
<body>

<h2>Apply for Job</h2>

<input type="text" id="firstName" placeholder="First Name"><br>
<input type="text" id="lastName" placeholder="Last Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="text" id="phone" placeholder="Phone"><br>
<input type="text" id="qualification" placeholder="Qualification"><br>

<button onclick="apply()">Submit Application</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSABfY7HBkOHLHbnJFBpoPoKNCzReKnPg",
  authDomain: "envjobs-49d56.firebaseapp.com",
  projectId: "envjobs-49d56",
  storageBucket: "envjobs-49d56.firebasestorage.app",
  messagingSenderId: "107525561773",
  appId: "1:107525561773:web:6825902afb7b661c099524"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.apply = async function() {

    let data = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        qualification: document.getElementById("qualification").value,
        time: new Date()
    };

    if(Object.values(data).includes("")) {
        alert("Fill all fields");
        return;
    }

    try {
        await addDoc(collection(db, "applications"), data);
        alert("Application Submitted Successfully!");
    } catch (e) {
        console.error(e);
        alert("Error submitting");
    }
};
</script>

</body>
</html>
