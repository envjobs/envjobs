<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EnvJobs</title>

<style>
body { font-family: Arial; text-align: center; margin-top: 50px; }
.container { display: none; }
</style>

</head>
<body>

<!-- REGISTER PAGE -->
<div id="registerPage">
    <h2>Register</h2>
    <input type="email" id="regEmail" placeholder="Email"><br><br>
    <input type="password" id="regPassword" placeholder="Password"><br><br>
    <button onclick="register()">Register</button>
</div>

<!-- APPLICATION PAGE -->
<div id="applyPage" class="container">
    <h2>Job Application</h2>

    <input type="text" id="firstName" placeholder="First Name"><br><br>
    <input type="text" id="lastName" placeholder="Last Name"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="text" id="phone" placeholder="Phone"><br><br>
    <input type="text" id="qualification" placeholder="Qualification"><br><br>

    <button onclick="apply()">Apply</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSABfY7HBkOHLHbnJFBpoPoKNCzReKnPg",
  authDomain: "envjobs-49d56.firebaseapp.com",
  projectId: "envjobs-49d56",
  storageBucket: "envjobs-49d56.firebasestorage.app",
  messagingSenderId: "107525561773",
  appId: "1:107525561773:web:6825902afb7b661c099524"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.register = function() {
    let email = document.getElementById("regEmail").value;
    let password = document.getElementById("regPassword").value;

    if(email === "" || password === "") {
        alert("Fill all fields");
        return;
    }

    // Show application page
    document.getElementById("registerPage").style.display = "none";
    document.getElementById("applyPage").style.display = "block";
};

window.apply = async function() {
    let data = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        qualification: document.getElementById("qualification").value,
        time: new Date()
    };

    if(Object.values(data).includes("")) {
        alert("Fill all fields");
        return;
    }

    try {
        await addDoc(collection(db, "applications"), data);
        alert("Application Submitted Successfully!");
    } catch (e) {
        console.error(e);
        alert("Error submitting");
    }
};
</script>

</body>
</html>
